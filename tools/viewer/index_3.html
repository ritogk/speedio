<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>峠サーチャー 3D｜日本全国の峠道を探す</title>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js" as="script" crossorigin>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" as="style">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="theme-color" content="#FFFFFF">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">峠</div>
  <h1>峠サーチャー <span style="font-size:11px;color:var(--ink-soft)">3D</span></h1>
  <select class="pref-select" id="prefSelect" aria-label="都道府県を選択"></select>
  <button class="locate-btn" id="locateBtn">📍<span class="locate-label"> 現在地</span></button>
</header>

<main>
  <div class="map-area" id="mapArea">
    <div id="map"></div>
    <svg id="ghostLine" aria-hidden="true"></svg>

    <div class="m-search-pill" id="mSearchPill">
      <span class="m-sp-icon">🔍</span>
      <span class="m-sp-text" id="mSpText">峠を検索</span>
      <span class="m-sp-sep" id="mSpSep" style="display:none">|</span>
      <span class="m-sp-pref" id="mSpPref"></span>
    </div>
    <div class="m-filter-wrap" id="mFilterWrap"><div class="m-filter-bar" id="mFilterBar"></div></div>

    <div class="map-float" id="mapFloat">
      <button class="pc-locate-btn" id="pcLocateBtn" aria-label="現在地">📍</button>
    </div>
    <button class="m-terrain-btn" id="mTerrainBtn" aria-label="地図レイヤー">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L2 7 L12 12 L22 7Z"/><path d="M2 17 L12 22 L22 17"/><path d="M2 12 L12 17 L22 12"/></svg>
    </button>
    <button class="m-locate-btn" id="mLocateBtn" aria-label="現在地">📍</button>
    <div class="m-layer-popup" id="mLayerPopup">
      <button class="m-layer-opt" id="mLayer2d">
        <div class="m-layer-thumb">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 12h18M12 3v18"/></svg>
        </div>
        <span class="m-layer-name">2D</span>
      </button>
      <button class="m-layer-opt active" id="mLayer3d">
        <div class="m-layer-thumb">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 20 L8.5 9 L13 16 L17 11 L22 20Z"/><path d="M2 20h20"/></svg>
        </div>
        <span class="m-layer-name">3D</span>
      </button>
      <button class="m-layer-opt" id="mLayerLogistics">
        <div class="m-layer-thumb">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 13h4l2-4h10l2 4h4"/><rect x="3" y="13" width="18" height="6" rx="2"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/></svg>
        </div>
        <span class="m-layer-name">物流道路</span>
      </button>
      <button class="m-layer-opt active" id="mLayerClosure">
        <div class="m-layer-thumb">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9" fill="rgba(180,30,30,.2)"/><path d="M8 8l8 8M16 8l-8 8"/></svg>
        </div>
        <span class="m-layer-name">通行止め</span>
      </button>
      <button class="m-layer-opt" id="mLayerTourist">
        <div class="m-layer-thumb">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1976D2" stroke-width="1.5"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <span class="m-layer-name">観光名所</span>
      </button>
      <button class="m-layer-opt" id="mLayerToll">
        <div class="m-layer-thumb">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F57F17" stroke-width="2" stroke-linecap="round"><path d="M3 12h18"/><path d="M8 7l-3 5 3 5"/><path d="M16 7l3 5-3 5"/></svg>
        </div>
        <span class="m-layer-name">有料道路</span>
      </button>
    </div>
    <div class="map-ctrl">
      <button class="ctrl-btn" id="terrainToggle" aria-pressed="true">3D地形</button>
      <button class="ctrl-btn" id="logisticsToggle" aria-pressed="false">🚛 物流道路</button>
      <button class="ctrl-btn" id="closureToggle" aria-pressed="true">🚫 通行止め</button>
      <button class="ctrl-btn" id="touristToggle" aria-pressed="false">📷 観光名所</button>
      <button class="ctrl-btn" id="tollToggle" aria-pressed="false">💴 有料道路</button>
      <button class="ctrl-btn" id="kobanToggle" aria-pressed="false" style="display:none">👮</button>
    </div>

    <div class="view-ctrl" id="viewCtrl">
      <button id="adminToggleBtn" aria-label="管理者パネル" style="display:none">⚙</button>
      <button id="rotL" aria-label="左に回転">⟲</button>
      <button id="rotR" aria-label="右に回転">⟳</button>
    </div>

    <div class="admin-panel collapsed" id="adminPanel">
      <button class="wp-close" id="wpClose">✕</button>
        <label><span>標高</span><input type="number" step="0.1" data-w="elevation"></label>
        <label><span>起伏</span><input type="number" step="0.1" data-w="elevation_unevenness"></label>
        <label><span>道幅</span><input type="number" step="0.1" data-w="width"></label>
        <label><span>距離</span><input type="number" step="0.1" data-w="length"></label>
        <label><span>建物</span><input type="number" step="0.1" data-w="building"></label>
        <label><span>トンネル外</span><input type="number" step="0.1" data-w="tunnel_outside"></label>
        <label><span>コーナー弱</span><input type="number" step="0.1" data-w="corner_week"></label>
        <label><span>コーナー中</span><input type="number" step="0.1" data-w="corner_medium"></label>
        <label><span>コーナー強</span><input type="number" step="0.1" data-w="corner_strong"></label>
        <label><span>直線</span><input type="number" step="0.1" data-w="corner_none"></label>
        <label><span>C.バランス</span><input type="number" step="0.1" data-w="corner_balance"></label>
        <label><span>中央線</span><input type="number" step="0.1" data-w="claude_center_line_section"></label>
        <button class="wp-apply" id="weightApply">適用</button>
        <details class="wp-extra"><summary>その他</summary>
          <div class="wp-section" style="margin-top:4px">ピン設置</div>
          <div class="wp-pin-row">
            <input type="text" id="adminLatLng" placeholder="35.681,139.767" style="flex:1;min-width:0;font:inherit;font-size:10px;border:1px solid var(--line);border-radius:3px;padding:2px 4px">
            <button class="wp-apply" id="adminPinBtn" style="width:auto;margin:0;padding:2px 8px;flex-shrink:0">設置</button>
          </div>
          <div class="wp-section" style="margin-top:4px">訪問確認</div>
          <label><span>待機(秒)</span><input type="number" id="visitDelayInput" min="1" max="3600" value="60"></label>
        </details>
    </div>

    <div class="legend" id="mapLegend">
      <ul>
        <li><span class="swatch" style="background:var(--corner-strong)"></span>低速コーナー</li>
        <li><span class="swatch" style="background:var(--corner-medium)"></span>中速</li>
        <li><span class="swatch" style="background:var(--corner-weak)"></span>高速</li>
        <li><span class="swatch" style="background:var(--straight)"></span>ストレート</li>
        <li><span class="swatch" style="background:#9B30FF"></span>走行済</li>
        <li class="legend-logistics" style="display:none"><span class="swatch" style="background:#FFD600"></span>物流道路 重複</li>
        <li class="legend-toll-line" style="display:none"><span class="swatch" style="background:repeating-linear-gradient(90deg,#F57F17 0 6px,transparent 6px 9px)"></span>有料道路</li>
        <li class="legend-toll-overlap" style="display:none"><span class="swatch" style="background:#FF1493"></span>有料道路 重複</li>
      </ul>
    </div>

  </div>

  <section class="panel" id="panel">
    <div class="side-handle" id="sideHandle"><span class="chevron">◂</span></div>
    <div class="sheet-handle" id="sheetHandle">
      <div class="grip"></div>
      <div class="sheet-head">
        <div class="panel-logo">峠</div>
        <span class="count" id="resultCount"></span>
        <span class="pref-name" id="prefName" style="display:none">未選択</span>
        <button class="settings-btn" id="settingsBtn" aria-label="設定"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg><span class="settings-label"> 設定</span></button>
      </div>
    </div>
    <div class="panel-body">
      <div class="pref-tags-wrap" id="prefTagsWrap"><div class="pref-tags" id="prefTags"></div></div>
      <div class="searchbox">
        <input id="searchInput" type="search" placeholder="🔍 峠名・道路種別で検索" autocomplete="off">
      </div>
      <section class="presets">
        <div class="chip-row" role="group" aria-label="並び替え">
          <button class="chip" aria-pressed="false" data-preset="nearby">📍 周辺50km</button>
          <button class="chip" aria-pressed="true" data-preset="balance">バランス</button>
          <button class="chip" aria-pressed="false" data-preset="corner">コーナー</button>
          <button class="chip" aria-pressed="false" data-preset="updown">標高</button>
          <button class="chip" aria-pressed="false" data-preset="seclusion">秘境</button>
          <button class="chip" aria-pressed="false" data-preset="uphill">起伏</button>
          <button class="chip" aria-pressed="false" id="hideVisitedBtn">未走行</button>
          <button class="chip" aria-pressed="false" id="showFavoritesBtn">お気に入り</button>
        </div>
        <p class="preset-hint" id="presetHint">コーナー・標高・道幅をバランスよく評価します。</p>
      </section>
      <div class="m-sort-select" id="mSortSelect">
        <span class="m-sort-label">並べ替え</span>
        <button class="m-sort-btn" id="mSortBtn"><span id="mSortCurrent">バランス</span><span class="m-sort-arrow">▾</span></button>
      </div>
      <div style="position:relative"><div class="m-sort-menu" id="mSortMenu"></div></div>
      <div id="cards"></div>
    </div>
  </section>


  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <div class="settings-head">
        <h3>設定</h3>
        <button class="settings-close" id="settingsClose">✕</button>
      </div>
      <div class="settings-body">
        <div class="settings-item">
          <div class="settings-label">ナビアプリ</div>
          <div class="settings-desc">「行く」ボタンで使うナビアプリ</div>
          <div class="settings-nav-options" id="navOptions">
            <button class="settings-nav-opt" data-nav="google">📍 Google Maps</button>
            <button class="settings-nav-opt" data-nav="yahoo">🚙 Yahoo! カーナビ</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-picker-overlay" id="navPicker">
    <div class="nav-picker">
      <h3>ナビアプリを選択</h3>
      <div class="nav-picker-btns">
        <button class="nav-picker-btn" data-nav="google">
          <span class="nav-ico">📍</span>
          <div class="nav-label">Google Maps<div class="nav-sub">ブラウザで経路案内</div></div>
        </button>
        <button class="nav-picker-btn" data-nav="yahoo">
          <span class="nav-ico">🚙</span>
          <div class="nav-label">Yahoo! カーナビ<div class="nav-sub">アプリで経路案内</div></div>
        </button>
      </div>
      <label class="nav-picker-remember"><input type="checkbox" id="navRemember" checked>次回から同じアプリで開く</label>
      <button class="nav-picker-cancel" id="navCancel">キャンセル</button>
    </div>
  </div>

  <div class="visit-confirm-overlay" id="visitConfirm">
    <div class="visit-confirm">
      <h3 id="vcTitle">この峠に行きましたか？</h3>
      <div class="vc-card" id="vcCard"></div>
      <div id="vcStep1">
        <div class="visit-confirm-btns">
          <button class="visit-confirm-btn primary" id="vcYes">🚗 走行した</button>
          <button class="visit-confirm-btn secondary" id="vcDriving">🚗 走行中</button>
        </div>
        <button class="visit-confirm-cancel" id="vcNo">まだ行ってない</button>
      </div>
      <div id="vcStep2" style="display:none">
        <div class="visit-confirm-btns">
          <button class="visit-confirm-btn primary" id="vcFavYes">★ お気に入りに追加</button>
        </div>
        <button class="visit-confirm-cancel" id="vcFavSkip">閉じる</button>
      </div>
    </div>
  </div>

  <div class="m-search-backdrop" id="mSearchBackdrop"></div>
  <div class="m-search-overlay" id="mSearchOverlay">
    <div class="m-so-head">
      <input class="m-so-input" id="mSoInput" type="search" placeholder="峠名・道路種別で検索" autocomplete="off" enterkeyhint="search">
      <button class="m-so-cancel" id="mSoCancel">閉じる</button>
    </div>
    <div class="m-so-body">
      <div class="m-so-results" id="mSoResults"></div>
      <div id="mSoPrefSection">
        <div class="m-so-section" id="mSoPrefLabel">都道府県</div>
        <button class="m-so-nearby-btn" id="mSoNearby">📍 現在地の周辺をまとめて読み込む</button>
        <div id="mSoPrefGrid"></div>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loading"><div class="spinner"></div><p id="loadingText">読み込み中…</p></div>
  <div class="toast" id="toast"></div>
  <div class="overlay-3d" id="overlay3d">
    <div class="overlay-3d-hud">
      <button class="overlay-3d-close" id="close3d">✕</button>
      <div class="overlay-3d-info" id="info3d"></div>
    </div>
    <div class="overlay-3d-tools" id="tools3d">
      <button class="overlay-3d-toggle active" id="toggle3dSection">セクション</button>
      <button class="overlay-3d-toggle" id="toggle3dColor" style="display:none">登り/下り</button>
      <button class="overlay-3d-toggle" id="toggle3dGradient">勾配</button>
      <button class="overlay-3d-toggle" id="toggle3dInfra">トンネル/橋</button>
      <button class="overlay-3d-toggle" id="toggle3dBuildings" style="display:none">🏠 建物</button>
      <button class="overlay-3d-toggle" id="toggle3dPrint" style="display:none">🖨 印刷</button>
    </div>
    <div class="overlay-3d-legend" id="legend3d"></div>
    <div class="overlay-3d-params" id="params3d"></div>
    <div class="overlay-3d-cam">
      <button class="overlay-3d-cam-btn" id="cam3dTop">真上</button>
      <button class="overlay-3d-cam-btn" id="cam3dSide">側面</button>
      <button class="overlay-3d-cam-btn" id="cam3dReset">リセット</button>
    </div>
    <div class="overlay-3d-hint">1本指で回転 ・ 2本指で移動/ズーム</div>
  </div>

  <div class="print-overlay" id="printOverlay">
    <div class="print-toolbar">
      <button class="print-close" id="closePrint">✕</button>
      <button class="print-exec" id="execPrint">🖨 印刷する</button>
    </div>
    <div class="print-page">
      <h2 id="printName"></h2>
      <div class="print-route-label" id="printRouteLabel"></div>
      <div class="print-meta" id="printMeta"></div>
      <div class="print-bars" id="printBars"></div>
      <div class="print-canvas-wrap"><canvas id="printCanvas"></canvas></div>
      <div class="print-legend-row">
        <span><i style="background:#FF453A"></i>低速コーナー</span>
        <span><i style="background:#FF9F0A"></i>中速</span>
        <span><i style="background:#30D158"></i>高速</span>
        <span><i style="background:#98989D"></i>ストレート</span>
      </div>
    </div>
  </div>
</main>

<script src="state.js"></script>
<script src="visit.js"></script>
<script src="terrain.js"></script>
<script src="viewmodel.js"></script>
<script src="data-loader.js"></script>
<script src="map-init.js"></script>
<script src="ranking.js"></script>
<script src="nav.js"></script>
<script src="ui-events.js"></script>
<script src="mobile-ui.js"></script>
<script src="overlay-3d.js"></script>
<script src="print.js"></script>
<script src="admin.js"></script>
<script>
(function loadMapLibre(){
  var urls = [
    "https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js",
    "https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js",
    "https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
  ];
  var i = 0;
  function fail(msg){
    document.getElementById("map").innerHTML =
      '<div style="padding:20px;font-size:13px;line-height:1.7"><b>エラー:</b> '+msg+'</div>';
  }
  function next(){
    if(typeof maplibregl !== "undefined"){
      var testCv = document.createElement("canvas");
      var gl = testCv.getContext("webgl2") || testCv.getContext("webgl");
      if(!gl){
        fail("このブラウザ/環境はWebGLが無効のため3D地図を表示できません。ブラウザのハードウェアアクセラレーション設定を確認してください。");
        return;
      }
      try{
        App.initTerrain();
        App.initMap();
        App.initRanking();
        App.initVisit();
        App.initNav();
        App.initUI();
        App.initMobileUI();
        App.init3D();
        App.initPrint();
        App.initAdmin();
        App.restoreFilter().then(function(restored){
          if(!restored) App.initialLoad();
          App.restoreNavState();
          App.checkPendingVisitOnLoad();
        });
        App.updateVisitedUi();
      }catch(err){
        console.error(err);
        fail("初期化に失敗しました: "+err.message);
      }
      return;
    }
    if(i >= urls.length){
      fail("地図ライブラリを読み込めませんでした。ネットワーク接続を確認して再読み込みしてください。");
      return;
    }
    var s = document.createElement("script");
    s.src = urls[i++];
    s.crossOrigin = "anonymous";
    s.onload = next;
    s.onerror = next;
    document.head.appendChild(s);
  }
  next();
})();

document.addEventListener("gesturestart", function(e){ e.preventDefault(); });
document.addEventListener("dblclick", function(e){
  if(!e.target.closest("#map")) e.preventDefault();
});
window.addEventListener("error", function(e){
  if(e.message && e.message !== "Script error."){
    console.warn("[峠サーチャー] uncaught:", e.message, e.filename, e.lineno);
  }
});
window.addEventListener("unhandledrejection", function(e){
  console.warn("[峠サーチャー] unhandled promise:", e.reason);
});
</script>
</body>
</html>
